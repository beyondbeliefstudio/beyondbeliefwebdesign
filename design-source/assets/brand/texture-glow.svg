<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Beyond Belief — grain + glow texture tile">
  <defs>
    <radialGradient id="halo" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#CCFF00" stop-opacity="0.55"></stop>
      <stop offset="45%" stop-color="#7FA300" stop-opacity="0.12"></stop>
      <stop offset="100%" stop-color="#0B0E0A" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"></feTurbulence>
      <feColorMatrix type="saturate" values="0"></feColorMatrix>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"></feFuncA></feComponentTransfer>
    </filter>
  </defs>
  <rect width="600" height="600" fill="#0B0E0A"></rect>
  <rect width="600" height="600" fill="url(#halo)"></rect>
  <rect width="600" height="600" filter="url(#grain)"></rect>
</svg>